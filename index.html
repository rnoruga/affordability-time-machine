<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Affordability Time Machine</title>
  <style>
    body { font-family: monospace; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    select { margin: 4px; padding: 4px; }
    #result { margin-top: 24px; border-top: 1px solid #ccc; padding-top: 16px; }
    .profile { margin: 8px 0; padding: 8px; background: #f5f5f5; }
    .can { color: green; } .cannot { color: red; }
  </style>
</head>
<body>
  <h1>Affordability Time Machine</h1>

  <label>City:
    <select id="city"></select>
  </label>
  <label>Year:
    <select id="year"></select>
  </label>
  <label>Occupation:
    <select id="occupation"></select>
  </label>

  <div id="result"></div>

  <script>
    let data = [];

    fetch('output/results.json')
      .then(r => r.json())
      .then(json => {
        data = json;
        populate();
        render();
      });

    function populate() {
      const cities = [...new Set(data.map(d => d.city))];
      const years  = [...new Set(data.map(d => d.year))].sort();
      const occs   = [...new Set(data.flatMap(d => d.profiles.map(p => p.occupation_id)))];

      fill('city', cities);
      fill('year', years);
      fill('occupation', occs);

      ['city','year','occupation'].forEach(id =>
        document.getElementById(id).addEventListener('change', render)
      );
    }

    function fill(id, values) {
      const sel = document.getElementById(id);
      values.forEach(v => {
        const o = document.createElement('option');
        o.value = o.textContent = v;
        sel.appendChild(o);
      });
    }

    function render() {
      const city = document.getElementById('city').value;
      const year = +document.getElementById('year').value;
      const occ  = document.getElementById('occupation').value;

      const entry = data.find(d => d.city === city && d.year === year);
      if (!entry) return;

      const m = entry.market;
      const profiles = entry.profiles.filter(p => p.occupation_id === occ);

      let html = `
        <h2>${city} · ${year}</h2>
        <p>
          Median home: <b>$${m.median_home_price.toLocaleString()}</b> ·
          Median income: <b>$${m.median_household_income.toLocaleString()}</b> ·
          Mortgage rate: <b>${m.mortgage_rate}%</b> ·
          Price-to-income: <b>${m.price_to_income}x</b> ·
          Monthly payment: <b>$${m.monthly_payment.toLocaleString()}</b> ·
          Burden: <b>${m.burden_pct}%</b>
          <span style="color:gray;font-size:0.85em">[${m.confidence}]</span>
        </p>
        <h3>${occ} — household scenarios</h3>
      `;

      profiles.forEach(p => {
        const cls = p.can_afford ? 'can' : 'cannot';
        const icon = p.can_afford ? '✅' : '❌';
        html += `
          <div class="profile">
            ${icon} <b>${p.household_label}</b>
            · salary $${p.base_salary.toLocaleString()}
            · effective $${p.effective_income.toLocaleString()}
            · ratio <b>${p.price_to_income}x</b>
            · burden <span class="${cls}"><b>${p.burden_pct}%</b></span>
          </div>
        `;
      });

      document.getElementById('result').innerHTML = html;
    }
  </script>
</body>
</html>
